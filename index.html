<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Gasto R脙隆pido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a40;
    --green: #00e5a0;
    --green-dim: #00b37d;
    --red: #ff4d6d;
    --yellow: #ffd166;
    --blue: #4cc9f0;
    --purple: #7b5ea7;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100dvh;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: .5;
  }

  /* 芒聰聙芒聰聙 LAYOUT 芒聰聙芒聰聙 */
  .app {
    max-width: 440px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 0 20px 24px;
  }

  /* 芒聰聙芒聰聙 HEADER 芒聰聙芒聰聙 */
  .header {
    padding: 20px 0 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--green);
  }
  .logo span { color: var(--muted); }
  .header-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  /* 芒聰聙芒聰聙 CONFIG BANNER 芒聰聙芒聰聙 */
  .config-banner {
    background: linear-gradient(135deg, #1a1a28, #12121a);
    border: 1px solid var(--yellow);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--yellow);
    display: none;
  }
  .config-banner.show { display: block; }
  .config-banner strong { display: block; margin-bottom: 6px; font-size: 13px; }
  .config-banner input, .config-banner select {
    width: 100%; margin-top: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 10px;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .config-save {
    width: 100%; margin-top: 10px;
    background: var(--yellow);
    color: var(--bg);
    border: none; border-radius: 8px;
    padding: 10px;
    font-family: var(--font-display);
    font-weight: 700; font-size: 13px;
    cursor: pointer;
  }

  /* 芒聰聙芒聰聙 MIC BUTTON 芒聰聙芒聰聙 */
  .mic-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 24px 0 20px;
    flex-shrink: 0;
  }

  .mic-ring {
    position: relative;
    width: 160px; height: 160px;
  }
  .mic-ring::before, .mic-ring::after {
    content: '';
    position: absolute; inset: -12px;
    border-radius: 50%;
    border: 1px solid var(--green);
    opacity: 0;
    transition: opacity .3s;
  }
  .mic-ring.active::before {
    opacity: .3;
    animation: pulse-ring 1.5s ease-out infinite;
  }
  .mic-ring.active::after {
    opacity: .15;
    animation: pulse-ring 1.5s ease-out infinite .5s;
  }

  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: .3; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  .mic-btn {
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    transition: all .2s cubic-bezier(.34,1.56,.64,1);
    position: relative;
    overflow: hidden;
  }
  .mic-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at center, var(--green) 0%, transparent 70%);
    opacity: 0;
    transition: opacity .3s;
  }
  .mic-btn:active { transform: scale(.95); }
  .mic-btn.recording {
    border-color: var(--green);
    box-shadow: 0 0 40px rgba(0,229,160,.2), inset 0 0 30px rgba(0,229,160,.05);
  }
  .mic-btn.recording::before { opacity: .08; }
  .mic-btn.processing {
    border-color: var(--yellow);
    box-shadow: 0 0 40px rgba(255,209,102,.2);
    animation: processing-pulse .8s ease-in-out infinite alternate;
  }
  @keyframes processing-pulse {
    from { box-shadow: 0 0 20px rgba(255,209,102,.15); }
    to   { box-shadow: 0 0 50px rgba(255,209,102,.35); }
  }

  .mic-icon {
    font-size: 48px;
    transition: transform .2s;
    position: relative; z-index: 1;
  }
  .mic-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color .2s;
    position: relative; z-index: 1;
  }
  .mic-btn.recording .mic-label { color: var(--green); }
  .mic-btn.processing .mic-label { color: var(--yellow); }

  /* Waveform */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 40px;
    opacity: 0;
    transition: opacity .3s;
  }
  .waveform.active { opacity: 1; }
  .wave-bar {
    width: 3px;
    background: var(--green);
    border-radius: 2px;
    height: 6px;
    transition: height .1s;
  }
  .waveform.active .wave-bar {
    animation: wave-anim .6s ease-in-out infinite;
  }
  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: .08s; }
  .wave-bar:nth-child(3) { animation-delay: .16s; }
  .wave-bar:nth-child(4) { animation-delay: .24s; }
  .wave-bar:nth-child(5) { animation-delay: .32s; }
  .wave-bar:nth-child(6) { animation-delay: .24s; }
  .wave-bar:nth-child(7) { animation-delay: .16s; }
  .wave-bar:nth-child(8) { animation-delay: .08s; }
  .wave-bar:nth-child(9) { animation-delay: 0s; }
  @keyframes wave-anim {
    0%, 100% { height: 4px; }
    50% { height: 28px; }
  }

  /* 芒聰聙芒聰聙 STATUS / PREVIEW CARD 芒聰聙芒聰聙 */
  .status-area {
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .status-hint {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }
  .status-hint em { color: var(--text); font-style: normal; }

  /* Preview card */
  .preview-card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: none;
    animation: card-in .3s cubic-bezier(.34,1.56,.64,1);
  }
  .preview-card.show { display: block; }
  @keyframes card-in {
    from { transform: translateY(12px) scale(.97); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  .preview-card .p-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .preview-card .p-row:last-child { border-bottom: none; }
  .preview-card .p-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
  }
  .preview-card .p-value { font-weight: 600; color: var(--text); }
  .preview-card .p-value.money { color: var(--green); font-size: 18px; }
  .preview-card .p-value.cat { color: var(--blue); }
  .preview-card .p-value.loc {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--purple);
    text-align: right;
    max-width: 180px;
  }

  .preview-actions {
    display: flex; gap: 10px;
    margin-top: 14px;
  }
  .btn-confirm {
    flex: 1;
    background: var(--green);
    color: var(--bg);
    border: none; border-radius: 10px;
    padding: 12px;
    font-family: var(--font-display);
    font-weight: 800; font-size: 13px;
    letter-spacing: .05em;
    cursor: pointer;
    transition: transform .15s, opacity .15s;
  }
  .btn-confirm:active { transform: scale(.97); opacity: .85; }
  .btn-confirm.loading { opacity: .6; pointer-events: none; }
  .btn-discard {
    width: 48px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    transition: color .15s;
  }
  .btn-discard:hover { color: var(--red); }

  /* Edit fields */
  .editable {
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border);
    color: var(--text);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    text-align: right;
    outline: none;
    width: 140px;
  }
  .editable:focus { border-bottom-color: var(--green); }
  select.editable {
    -webkit-appearance: none;
    cursor: pointer;
  }

  /* 芒聰聙芒聰聙 HISTORY 芒聰聙芒聰聙 */
  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 24px 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: entry-in .25s ease-out;
  }
  @keyframes entry-in {
    from { transform: translateX(-8px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  .entry-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .entry-info { flex: 1; min-width: 0; }
  .entry-desc {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .entry-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    gap: 8px;
  }
  .entry-meta .cat-badge {
    color: var(--blue);
    background: rgba(76,201,240,.1);
    padding: 1px 6px;
    border-radius: 4px;
  }
  .entry-meta .loc-badge {
    color: var(--purple);
  }
  .entry-amount {
    font-family: var(--font-mono);
    font-weight: 500;
    flex-shrink: 0;
  }
  .entry-amount.expense { color: var(--red); }
  .entry-amount.income  { color: var(--green); }

  .entry-status {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .entry-status.synced  { background: var(--green); }
  .entry-status.pending { background: var(--yellow); }
  .entry-status.error   { background: var(--red); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 32px 0;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 2;
  }
  .empty-state .big { font-size: 36px; display: block; margin-bottom: 8px; }

  /* 芒聰聙芒聰聙 TOAST 芒聰聙芒聰聙 */
  .toast {
    position: fixed;
    bottom: calc(24px + var(--safe-bottom));
    left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
    z-index: 1000;
    pointer-events: none;
    opacity: 0;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error   { border-color: var(--red);   color: var(--red); }
  .toast.info    { border-color: var(--yellow); color: var(--yellow); }

  /* 芒聰聙芒聰聙 SETTINGS GEAR 芒聰聙芒聰聙 */
  .settings-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 18px;
    transition: color .2s, transform .3s;
    padding: 4px;
  }
  .settings-btn:hover { color: var(--text); transform: rotate(45deg); }

  /* 芒聰聙芒聰聙 GPS indicator 芒聰聙芒聰聙 */
  .gps-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-left: 6px;
    transition: background .3s;
  }
  .gps-dot.active { background: var(--green); animation: gps-blink 2s infinite; }
  @keyframes gps-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }

  /* Scrollable history */
  .history-scroll {
    overflow-y: auto;
    max-height: calc(100dvh - 520px);
    padding-bottom: 8px;
  }
  .history-scroll::-webkit-scrollbar { width: 3px; }
  .history-scroll::-webkit-scrollbar-track { background: transparent; }
  .history-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

async function toggleRecording() {
  if (isRecording) { stopRecording(); return; }
  const apiKey = getCfg('anthropic');
  if (!apiKey) { toggleConfig(); showToast('Configure a API key primeiro', 'info'); return; }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: getSupportedMimeType() });
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); processAudio(); };
    mediaRecorder.start(100);
    isRecording = true;
    setRecordingUI(true);
  } catch(e) {
    showToast('Microfone n脙拢o permitido', 'error');
  }
}

function stopRecording() {
  if (mediaRecorder && isRecording) { mediaRecorder.stop(); isRecording = false; }
}

function getSupportedMimeType() {
  const types = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
}

function useSpeechRecognitionFlow() {
  resetMicUI();
  document.getElementById('status-area').innerHTML =
    '<p class="status-hint">Toque e <em>fale</em> 芒聙聰 o iPhone vai transcrever</p>';

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    // Fallback: manual text input
    showManualInput();
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  const btn = document.getElementById('mic-btn');
  const icon = document.getElementById('mic-icon');
  const lbl  = document.getElementById('mic-label');
  const ring = document.getElementById('mic-ring');
  const wf   = document.getElementById('waveform');

  btn.classList.add('recording');
  ring.classList.add('active');
  wf.classList.add('active');
  icon.textContent = '芒聫鹿'; lbl.textContent = 'Ouvindo芒聙娄';

  // Override click to stop
  btn.onclick = () => { recognition.stop(); btn.onclick = toggleRecording; };

  recognition.onresult = async (event) => {
    const transcript = event.results[0][0].transcript;
    resetMicUI();
    btn.onclick = toggleRecording;
    await sendToClaudeForParsing(transcript);
  };

  recognition.onerror = () => {
    resetMicUI();
    btn.onclick = toggleRecording;
    showToast('N脙拢o consegui ouvir. Tente novamente.', 'error');
    document.getElementById('status-area').innerHTML =
      '<p class="status-hint">Diga algo como:<br><em>"gastei 45 reais no iFood"</em></p>';
  };

  recognition.onend = () => {
    btn.classList.remove('recording');
    ring.classList.remove('active');
    wf.classList.remove('active');
  };

  recognition.start();
}

function showPreview(data) {
  document.getElementById('p-desc').value  = data.descricao || '';
  document.getElementById('p-value').value = data.valor     || '';
  document.getElementById('p-date').value  = data.data      || new Date().toISOString().split('T')[0];
  document.getElementById('p-tipo').value  = data.tipo      || 'Sa脙颅da';

  const sel = document.getElementById('p-cat');
  for (let o of sel.options) if (o.value === data.categoria) { sel.value = data.categoria; break; }

  // GPS
  if (currentCoords) {
    const locRow = document.getElementById('p-loc-row');
    locRow.style.display = 'flex';
    document.getElementById('p-loc').textContent =
      `${currentCoords.lat.toFixed(5)}, ${currentCoords.lng.toFixed(5)}`;
  }

  document.getElementById('status-area').style.display = 'none';
  document.getElementById('preview-card').classList.add('show');
  resetMicUI();
}

function discardEntry() {
  document.getElementById('preview-card').classList.remove('show');
  document.getElementById('status-area').style.display = 'flex';
  document.getElementById('status-area').innerHTML =
    '<p class="status-hint">Diga algo como:<br><em>"gastei 45 reais no iFood"</em></p>';
}

// 芒聰聙芒聰聙 CONFIRM & SEND TO SHEETS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function confirmEntry() {
  const entry = {
    data:      document.getElementById('p-date').value,
    descricao: document.getElementById('p-desc').value,
    categoria: document.getElementById('p-cat').value,
    valor:     parseFloat(document.getElementById('p-value').value),
    tipo:      document.getElementById('p-tipo').value,
    lat:       currentCoords?.lat || null,
    lng:       currentCoords?.lng || null,
    ts:        Date.now(),
    id:        Math.random().toString(36).slice(2,9)
  };

  const btn = document.getElementById('btn-confirm');
  btn.classList.add('loading');
  btn.textContent = '芒聫鲁 Enviando芒聙娄';

  // Add to local history immediately
  entry.status = 'pending';
  entries.unshift(entry);
  saveEntries();
  renderHistory();
  discardEntry();

  // Send to Google Sheets via Apps Script
  const gasUrl = getCfg('gas_url');
  if (!gasUrl) {
    entry.status = 'error';
    saveEntries(); renderHistory();
    showToast('Configure o Apps Script URL', 'info');
    btn.classList.remove('loading'); btn.textContent = '芒聹聯 Salvar no Sheets';
    return;
  }

  try {
    const formData = new URLSearchParams({
      data:      entry.data,
      descricao: entry.descricao,
      categoria: entry.categoria,
      valor:     entry.valor,
      tipo:      entry.tipo,
      lat:       entry.lat || '',
      lng:       entry.lng || '',
      mes:       getMesFromDate(entry.data)
    });

    await fetch(gasUrl, { method: 'POST', body: formData, mode: 'no-cors' });

    // no-cors means we can't read response, assume success after 2s
    setTimeout(() => {
      entry.status = 'synced';
      saveEntries(); renderHistory();
      showToast('Salvo no Google Sheets 芒聹聯', 'success');
    }, 1500);

  } catch(e) {
    entry.status = 'error';
    saveEntries(); renderHistory();
    showToast('Erro ao enviar. Salvo localmente.', 'error');
  }

  btn.classList.remove('loading');
  btn.textContent = '芒聹聯 Salvar no Sheets';
}

function getMesFromDate(dateStr) {
  const meses = ["Janeiro","Fevereiro","Mar脙搂o","Abril","Maio","Junho",
                 "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  return meses[new Date(dateStr + 'T12:00:00').getMonth()];
}

// 芒聰聙芒聰聙 RENDER HISTORY 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function renderHistory() {
  const list = document.getElementById('history-list');
  if (!entries.length) {
    list.innerHTML = `<div class="empty-state">
      <span class="big">冒聼聨聶</span>
      Nenhum lan脙搂amento ainda.<br>Toque no microfone e fale!
    </div>`;
    return;
  }

  list.innerHTML = entries.slice(0, 20).map(e => {
    const icon    = CATEGORY_ICONS[e.categoria] || '冒聼聯娄';
    const amount  = `R$ ${Math.abs(e.valor).toFixed(2).replace('.',',')}`;
    const isInc   = e.tipo === 'Entrada';
    const dateStr = new Date(e.data+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
    const locBadge = (e.lat && e.lng) ? `<span class="loc-badge">冒聼聯聧</span>` : '';
    const statusClass = e.status || 'pending';
    return `
    <div class="entry-card">
      <div class="entry-icon">${icon}</div>
      <div class="entry-info">
        <div class="entry-desc">${e.descricao}</div>
        <div class="entry-meta">
          <span>${dateStr}</span>
          <span class="cat-badge">${e.categoria}</span>
          ${locBadge}
        </div>
      </div>
      <div class="entry-amount ${isInc?'income':'expense'}">${isInc?'+':'芒聢聮'} ${amount}</div>
      <div class="entry-status ${statusClass}" title="${statusClass}"></div>
    </div>`;
  }).join('');
}

function saveEntries() {
  localStorage.setItem('gasto_entries', JSON.stringify(entries.slice(0,100)));
}

// 芒聰聙芒聰聙 TOAST 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
